name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        pytest -v --tb=short
    
    - name: Test Report
      if: always()
      run: |
        echo "✅ All tests passed successfully!"
        echo "Build Status: SUCCESS"
    
    - name: Deploy message
      run: |
        echo "🚀 Deploying to Render..."
        echo "Deployment will be handled by Render's auto-deployment feature"
        echo "Branch: main"
        echo "Status: Ready for production deployment"
